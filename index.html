<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Servicio</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; }
        .lucide { vertical-align: middle; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Componente para los Iconos Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
            const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            
            const temas = {
                sakura: {
                    name: "Sakura", primary: "text-pink-600", primaryBg: "bg-pink-600", primaryLight: "bg-pink-50",
                    primaryBorder: "border-pink-200", accent: "text-pink-400", gradient: "from-pink-500 to-rose-500",
                    bgOverlay: "bg-pink-50", localImg: "https://www.transparenttextures.com/patterns/cubes.png"
                },
                morado: {
                    name: "Morado", primary: "text-purple-600", primaryBg: "bg-purple-600", primaryLight: "bg-purple-50",
                    primaryBorder: "border-purple-200", accent: "text-purple-400", gradient: "from-purple-500 to-indigo-600",
                    bgOverlay: "bg-purple-50", localImg: "https://www.transparenttextures.com/patterns/diamond-upholstery.png"
                }
            };

            const [temaActual, setTemaActual] = useState(() => localStorage.getItem('sakura_theme') || 'sakura');
            const t = temas[temaActual] || temas.sakura;

            const [mesIndice, setMesIndice] = useState(new Date().getMonth());
            const [anioActual, setAnioActual] = useState(new Date().getFullYear());
            const [datosMensuales, setDatosMensuales] = useState(() => JSON.parse(localStorage.getItem('sakura_data_v6')) || {});
            
            const storageKey = `${meses[mesIndice]}_${anioActual}`;
            const currentData = datosMensuales[storageKey] || { meta: 50, estudiantes: [], historial: {} };

            useEffect(() => {
                localStorage.setItem('sakura_data_v6', JSON.stringify(datosMensuales));
                localStorage.setItem('sakura_theme', temaActual);
            }, [datosMensuales, temaActual]);

            const calcularTotales = () => {
                let totalMinutos = 0;
                Object.values(currentData.historial || {}).forEach(dia => { totalMinutos += (dia.h * 60) + dia.m; });
                return { horas: Math.floor(totalMinutos / 60), minutos: totalMinutos % 60, totalMinutos };
            };

            const { horas, minutos, totalMinutos } = calcularTotales();
            const updateCurrentMonth = (newData) => {
                setDatosMensuales(prev => ({ ...prev, [storageKey]: { ...currentData, ...newData } }));
            };

            const [nuevaHora, setNuevaHora] = useState('');
            const [nuevoMinuto, setNuevoMinuto] = useState('');

            const registrarActividad = (hInput, mInput) => {
                let h = parseInt(hInput) || 0;
                let m = parseInt(mInput) || 0;
                const hoy = new Date().getDate();
                if (h > 0 || m > 0) {
                    const historialActualizado = { ...currentData.historial };
                    const tiempoPrevio = historialActualizado[hoy] || { h: 0, m: 0 };
                    historialActualizado[hoy] = { h: tiempoPrevio.h + h, m: tiempoPrevio.m + m };
                    updateCurrentMonth({ historial: historialActualizado });
                }
            };

            return (
                <div className={`min-h-screen ${t.bgOverlay} p-4 font-sans text-slate-700 relative`}>
                    <div className="max-w-md mx-auto relative z-10">
                        <header className="text-center mb-8 pt-6">
                            <div className={`inline-flex p-3 rounded-full ${t.primaryLight} ${t.primary} mb-2`}>
                                <Icon name="smile" size={40} />
                            </div>
                            <h1 className="text-3xl font-extrabold text-slate-800">Mi Registro</h1>
                            <p className="text-sm font-medium opacity-60">{meses[mesIndice]} {anioActual}</p>
                        </header>

                        <div className={`bg-gradient-to-br ${t.gradient} p-6 rounded-[2rem] shadow-lg text-white mb-6`}>
                            <p className="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Total del Mes</p>
                            <h2 className="text-4xl font-black">{horas}h {minutos}m</h2>
                            <div className="mt-4 bg-white/20 h-2 rounded-full overflow-hidden">
                                <div className="bg-white h-full" style={{width: `${Math.min(100, (totalMinutos/(currentData.meta*60))*100)}%`}}></div>
                            </div>
                        </div>

                        <section className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 mb-6">
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Añadir Tiempo</h3>
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <input type="number" placeholder="Horas" className="bg-slate-50 rounded-xl p-3 text-xl font-bold outline-none" value={nuevaHora} onChange={e => setNuevaHora(e.target.value)}/>
                                <input type="number" placeholder="Mins" className="bg-slate-50 rounded-xl p-3 text-xl font-bold outline-none" value={nuevoMinuto} onChange={e => setNuevoMinuto(e.target.value)}/>
                            </div>
                            <button onClick={() => {registrarActividad(nuevaHora, nuevoMinuto); setNuevaHora(''); setNuevoMinuto('');}} className={`w-full ${t.primaryBg} text-white py-4 rounded-xl font-bold uppercase tracking-tight shadow-md`}>Registrar hoy</button>
                        </section>

                        <div className="flex justify-center gap-4">
                            <button onClick={() => setTemaActual(temaActual === 'sakura' ? 'morado' : 'sakura')} className="p-4 bg-white rounded-full shadow-sm">
                                <Icon name="palette" className={t.primary} />
                            </button>
                            <button onClick={() => {
                                const msg = `*Informe:* ${meses[mesIndice]}\n*Horas:* ${horas}h ${minutos}m`;
                                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
                            }} className="p-4 bg-[#25D366] text-white rounded-full shadow-sm">
                                <Icon name="send" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
